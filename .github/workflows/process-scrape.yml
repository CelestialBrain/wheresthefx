name: Process Instagram Scrape

on:
  workflow_dispatch:
    inputs:
      dataset_url:
        description: 'Apify Dataset URL (e.g., https://api.apify.com/v2/datasets/ABC123/items?format=json)'
        required: true
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  DATA_INGEST_TOKEN: ${{ secrets.DATA_INGEST_TOKEN }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  process-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Process scrape
        working-directory: scripts
        run: |
          # Retry up to 3 times if script fails
          for attempt in 1 2 3; do
            echo "🔄 Attempt $attempt of 3..."
            if node process-scrape.js "${{ github.event.inputs.dataset_url }}"; then
              echo "✅ Process completed successfully on attempt $attempt"
              exit 0
            else
              exit_code=$?
              echo "⚠️ Attempt $attempt failed with exit code $exit_code"
              if [ $attempt -lt 3 ]; then
                echo "⏳ Waiting 30 seconds before retry..."
                sleep 30
              fi
            fi
          done
          echo "❌ All 3 attempts failed"
          exit 1

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results-${{ github.run_id }}
          path: scripts/results/
          retention-days: 30
